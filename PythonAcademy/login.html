<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Python Academy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-fontawesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- Main Style -->
    <link rel="stylesheet" href="styles.css?v=3">
    
    <style>
        body {
            /* Fix the undefined background variable by using a rich gradient background */
            background: linear-gradient(135deg, hsl(220, 24%, 7%) 0%, hsl(263, 90%, 10%) 50%, hsl(222, 20%, 11%) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* Dynamic background animations */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            background: rgba(139, 92, 246, 0.15); /* Purple glow */
            top: -200px;
            left: -100px;
            animation: float 10s infinite ease-in-out alternate;
        }

        body::after {
            background: rgba(16, 185, 129, 0.15); /* Emerald glow */
            bottom: -200px;
            right: -100px;
            animation: float 12s infinite ease-in-out alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        .auth-container {
            /* Premium Glassmorphism Card */
            background: rgba(23, 27, 38, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-left: 0.25rem;
        }

        .auth-input {
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .auth-input:focus {
            border-color: #a855f7;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .auth-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .auth-btn {
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: white;
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-google img {
            width: 20px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 1.5rem 0;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-divider span {
            padding: 0 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .auth-toggle a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .auth-toggle a:hover {
            color: #d8b4fe;
            text-decoration: underline;
        }

        /* Improved Error and Success Messages */
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 1rem;
            backdrop-filter: blur(8px);
        }

        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 1rem;
            backdrop-filter: blur(8px);
        }

        .forgot-password {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: right;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: white;
            text-decoration: underline;
        }

        .back-link {
            position: absolute;
            top: -2.5rem;
            left: 0;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Academy</a>
        
        <div class="auth-header">
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle">Sign in to sync your progress across devices.</p>
        </div>

        <button id="btn-google" class="auth-btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Sign in with Google
        </button>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div id="auth-error" class="error-message"></div>
        <div id="auth-success" class="success-message"></div>

        <div class="auth-form" id="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>

            <div class="input-group" id="confirm-password-group" style="display: none;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" class="auth-input" placeholder="••••••••">
            </div>

            <a id="btn-forgot-password" class="forgot-password">Forgot Password?</a>

            <button id="btn-submit" class="auth-btn btn-submit">Sign In</button>
        </div>

        <div class="auth-toggle">
            <span id="toggle-text">Don't have an account?</span> 
            <a id="btn-toggle-mode">Create one</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
